<!doctype html>
<!--
  Knowii / DeveloPassion Gumroad landing-page shell.
  The render script (render.mjs) injects per-section HTML at the PAGE_CONTENT slot and
  fills the {{HEAD_*}} / {{BUY_*}} tokens from store-website product data.
  Brand tokens mirror DeveloPassion/store-website src/styles/index.css (dark theme).

  SANITIZER NOTE (verified against Gumroad CLI v0.17.0): the sanitizer KEEPS <script>
  (incl. the Tailwind CDN), <style>, class/style attributes, data-gumroad-* and CSS
  like scroll-snap. It only removes non-allowlisted <head> tags (charset/viewport/
  title/meta). The inline <style> base layer is belt-and-suspenders. Always re-check
  .sanitization_report after `gumroad products page preview`; the allowlist can change.
-->
<html lang="en">
<head>
<!--
  No <meta>/<title> here on purpose: Gumroad strips non-allowlisted <head> tags
  (charset, viewport, title, meta description) and provides its own around the
  embedded HTML, so the sanitization report comes back clean (0 removed).
  <script> and <style> ARE kept by the sanitizer (verified) — Tailwind works live.
-->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: {
        brand: '#e5007d', 'brand-text': '#ff1493',
        bg: '#37404c', surface: '#3f4957', 'surface-elev': '#475363',
        problem: '#ef4444', agitate: '#f59e0b', solution: '#10b981',
      },
      fontFamily: { sans: ['Noto Sans','system-ui','-apple-system','Segoe UI','Roboto','sans-serif'] },
    } },
  };
</script>

<style>
  body { margin:0; background:#37404c; color:#fff;
         font-family:'Noto Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
         line-height:1.6; -webkit-font-smoothing:antialiased; padding-bottom:88px; }
  a { color:#ff1493; }
  strong { color:#fff; font-weight:700; }
  .btn { display:inline-block; background:#e5007d; color:#fff; text-decoration:none;
         font-weight:700; padding:16px 34px; border-radius:999px;
         box-shadow:0 8px 24px rgba(229,0,125,.35); transition:transform .12s ease; }
  .btn:hover { transform:translateY(-2px); }
  .card { background:#3f4957; border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:28px; }
  /* alternating section tint for rhythm */
  body > section:nth-of-type(even) { background:rgba(0,0,0,.16); }
  /* hero glow — pure CSS, survives the sanitizer */
  .hero-bg { background:
      radial-gradient(60% 50% at 50% 0%, rgba(229,0,125,.28), transparent 70%),
      radial-gradient(40% 35% at 80% 10%, rgba(255,20,147,.12), transparent 70%); }
  /* list markers */
  ul.checks, ul.crosses, ul.warns { list-style:none; padding-left:0; }
  ul.checks li::before  { content:'✓'; color:#10b981; font-weight:800; margin-right:.55rem; }
  ul.crosses li::before { content:'✗'; color:#ef4444; font-weight:800; margin-right:.55rem; }
  ul.warns li::before   { content:'⚠'; color:#f59e0b; margin-right:.55rem; }
  .kicker { display:inline-block; text-transform:uppercase; letter-spacing:.18em; font-size:.75rem;
            font-weight:800; color:#ff1493; margin-bottom:14px; }
  .statnum { font-size:2rem; font-weight:800; color:#ff1493; line-height:1.1; }
  .pill { display:inline-block; background:rgba(229,0,125,.16); border:1px solid rgba(255,20,147,.45);
          color:#ff8dc7; border-radius:999px; padding:6px 14px; font-size:.85rem; font-weight:700; }
  /* Pure-CSS scroll-snap carousel (no JS — verified to survive Gumroad sanitizer) */
  .carousel { display:flex; gap:16px; overflow-x:auto; scroll-snap-type:x mandatory;
              -webkit-overflow-scrolling:touch; padding:4px 0 12px; scroll-padding-left:0; }
  .carousel > * { scroll-snap-align:start; flex:0 0 85%; }
  @media (min-width:600px) { .carousel > * { flex-basis:48%; } }
  .carousel::-webkit-scrollbar { height:8px; }
  .carousel::-webkit-scrollbar-thumb { background:rgba(255,255,255,.2); border-radius:8px; }
  .carousel img { width:100%; height:100%; object-fit:cover; border-radius:16px; }
  /* screenshot masonry — natural-height images, no cropping, no row gaps */
  .shots { columns:1; column-gap:20px; }
  @media (min-width:640px) { .shots { columns:2; } }
  .shots figure { margin:0 0 20px; background:#3f4957; border:1px solid rgba(255,255,255,.1);
                  border-radius:16px; padding:12px; break-inside:avoid; }
  .shots img { width:100%; height:auto; border-radius:10px; display:block; }
  /* NOTE: no YouTube embeds — frame-src allows them but the sandbox (no allow-same-origin)
     propagates into nested iframes and crashes the YouTube player. Videos go in as text. */
  /* testimonial masonry columns */
  .t-cols { columns:1; column-gap:20px; }
  @media (min-width:640px)  { .t-cols { columns:2; } }
  @media (min-width:1024px) { .t-cols { columns:3; } }
  .t-card { break-inside:avoid; margin-bottom:20px; }
  .t-featured { border-color:rgba(255,20,147,.55); box-shadow:0 0 24px rgba(229,0,125,.15); }
  .buybar { position:fixed; left:0; right:0; bottom:0; background:rgba(47,55,66,.96);
            border-top:1px solid rgba(255,255,255,.12); padding:12px 20px; z-index:50;
            display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; }
</style>
</head>

<body class="font-sans bg-bg text-white">

<!--PAGE_CONTENT-->

<!-- Footer (copyright only — the Gumroad sandbox blocks external link navigation) -->
<footer class="px-5 py-10 text-center text-white/60 text-xs border-t" style="border-color:rgba(255,255,255,.1)">
  © <span id="yr">2026</span> Sébastien Dubois · DeveloPassion · 30-day guarantee · All rights reserved.
</footer>
<script>(function(){var y=document.getElementById('yr');if(y){try{y.textContent=new Date().getFullYear();}catch(e){}}})();</script>

<!-- Sticky buy bar (pure CSS, no JS) -->
<div class="buybar">
  <span class="font-bold">{{BUY_NAME}} &mdash; <span data-gumroad-field="price">{{BUY_PRICE}}</span></span>
  <a class="btn" data-gumroad-action="buy">{{BUY_CTA}}</a>
</div>

</body>
</html>
